id: S-08
description: |
  An unreachable goal (placed inside a wall) must produce PlanResult::
  GoalInCollision (or NoPathFound, depending on which check fires first)
  and never produce a path. The controller must not be invoked, cmd_vel
  must stay at zero.
seed: 42
tolerances:
  pose_xy: 1.0e-4
trials:
  count: 1
  seed_strategy: fixed
plugins:
  planner:
    name: astar
    params:
      occupied_threshold: 65
      inflation_radius: 0.20
      unknown_is_obstacle: true
  controller:
    name: lookahead
    params:
      kp_xy: 1.0
      kp_yaw: 1.2
      max_speed_xy: 0.25
      max_speed_yaw: 0.8
      lookahead_dist: 0.30
      goal_xy_tolerance: 0.05
      goal_yaw_tolerance: 0.10
      goal_stateful: true
map:
  resolution: 0.10
  origin: [0.0, 0.0]
  # All wall.
  occupancy: |
    ##########
    ##########
    ##########
    ##########
    ##########
sequence:
  - {action: set_pose, pose: [0.10, 0.10, 0.0]}    # already in collision per the all-wall map
  - {action: set_goal, pose: [0.90, 0.90, 0.0]}
  - {action: step,    count: 5, dt: 0.05}
  # Acceptable terminal outcomes for this scenario.
  - {action: assert, key: outcome,
     value_one_of: [START_IN_COLLISION, GOAL_IN_COLLISION, NO_PATH_FOUND]}
  - {action: assert, key: last_twist.vx, value: 0.0, tolerance: 1.0e-9}
  - {action: assert, key: last_twist.vy, value: 0.0, tolerance: 1.0e-9}
  - {action: assert, key: last_twist.wz, value: 0.0, tolerance: 1.0e-9}
metrics:
  collision_count: 0      # we never moved
  nan_inf_count: 0
