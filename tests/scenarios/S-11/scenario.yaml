id: S-11
description: |
  Calling HeightAwareAStarPlanner::planPath before any height grid has been
  delivered must return PlanResult::NotInitialized cleanly. We do NOT crash,
  do NOT produce a path, and the controller is never invoked.
seed: 42
tolerances: {}
trials:
  count: 1
  seed_strategy: fixed
plugins:
  planner:
    name: height_aware_astar
    params:
      heading_bins: 16
      heading_weight: 0.30
      occupancy_lethal_threshold: 65
      height_lethal_threshold: 50
      inflation_radius: 0.30
      rotate_window: 4.0
map:
  resolution: 0.10
  origin: [0.0, 0.0]
  occupancy: |
    ..........
    ..........
# Intentionally NO height_map provided.
sequence:
  - {action: set_pose, pose: [0.10, 0.10, 0.0]}
  - {action: plan_only, start: [0.10, 0.10, 0.0], goal: [0.50, 0.10, 0.0]}
  - {action: assert,    key: outcome, value: NOT_INITIALIZED}
metrics:
  nan_inf_count: 0
