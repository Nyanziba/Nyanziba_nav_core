id: S-07
description: |
  Right before reaching the end of a path we cancel, then immediately set a
  different goal. Any residual stateful flag (xy_goal_reached_, last lookahead
  index, accumulated cmd_vel history) must not contaminate the second pass.
  We assert the first attempt ends CANCELLED, and that during the second
  attempt the controller does not falsely report goal_reached at t=0.
seed: 42
tolerances:
  pose_xy: 1.0e-4
trials:
  count: 1
  seed_strategy: fixed
plugins:
  planner:
    name: astar
    params:
      occupied_threshold: 65
      inflation_radius: 0.20
      unknown_is_obstacle: true
  controller:
    name: lookahead
    params:
      kp_xy: 1.0
      kp_yaw: 1.2
      max_speed_xy: 0.25
      max_speed_yaw: 0.8
      lookahead_dist: 0.30
      goal_xy_tolerance: 0.05
      goal_yaw_tolerance: 0.10
      goal_stateful: true
map:
  resolution: 0.10
  origin: [0.0, 0.0]
  occupancy: |
    ..........
    ..........
    ..........
    ..........
    ..........
sequence:
  - {action: set_pose, pose: [0.10, 0.10, 0.0]}
  - {action: set_goal, pose: [0.50, 0.50, 0.0]}
  # Drive almost to the end (within 1.5 * xy_tolerance of the goal).
  - {action: drive_until, condition: distance_to_goal < 0.08, max_steps: 200, dt: 0.05}
  - {action: cancel}
  - {action: assert, key: outcome, value: CANCELLED}
  # Different goal; first computeCommand on the new goal must NOT report
  # goal_reached based on the leftover xy_goal_reached_.
  - {action: set_goal, pose: [0.10, 0.50, 1.5708]}
  - {action: step, count: 1, dt: 0.05}
  - {action: assert, key: xy_goal_reached, value: false}
  - {action: drive_until, condition: goal_reached, max_steps: 300, dt: 0.05}
  - {action: assert, key: outcome, value: SUCCESS}
metrics:
  collision_count: 0
  nan_inf_count: 0
