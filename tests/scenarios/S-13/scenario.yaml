id: S-13
description: |
  A* on a grid produces zig-zag paths whose curvature changes step-by-step.
  Running the result through path_postprocessing (line cleaner +
  Bspline smoother + velocity profiler) must produce a path whose
  consecutive-segment curvature jump |Δκ| stays below the threshold, and
  the resulting cmd_vel jerk profile must stay within bounds.
seed: 42
tolerances:
  pose_xy: 1.0e-3
  pose_yaw: 1.0e-2
  curvature: 1.0e-2
trials:
  count: 1
  seed_strategy: fixed
plugins:
  planner:
    name: astar
    params:
      occupied_threshold: 65
      inflation_radius: 0.20
      unknown_is_obstacle: true
  postprocessing:
    name: bspline_with_velocity_profile
    params:
      bspline_smoothing: 0.20
      bspline_resolution: 0.05
      max_acc_xy: 0.5
      max_jerk_xy: 4.0
      max_acc_yaw: 1.5
      cleaner_min_distance: 0.02     # collapse near-duplicate poses
  controller:
    name: pure_pursuit
    params:
      pp_max_speed_xy: 0.30
      pp_max_speed_yaw: 0.80
      pp_max_acc_xy: 0.50
      pp_lookahead_dist: 0.40
      goal_xy_tolerance: 0.05
      goal_yaw_tolerance: 0.10
      goal_stateful: true
map:
  resolution: 0.10
  origin: [0.0, 0.0]
  # Diagonal channel that forces A* to zig-zag.
  occupancy: |
    ..........
    .###......
    ...###....
    .....###..
    .......###
    ..........
sequence:
  - {action: set_pose, pose: [0.10, 0.50, 0.0]}
  - {action: set_goal, pose: [0.90, 0.20, 0.0]}
  - {action: drive_until, condition: goal_reached, max_steps: 400, dt: 0.05}
  - {action: assert, key: outcome, value: SUCCESS}
  # Smoothness assertions (the whole point of this scenario).
  - {action: assert, key: metrics.path_curvature_jump_max, value: 5.0}
  - {action: assert, key: metrics.cmd_vel_jerk_max,        value: 4.0}
metrics:
  path_curvature_jump_max: 5.0
  cmd_vel_jerk_max: 4.0
  collision_count: 0
  nan_inf_count: 0
