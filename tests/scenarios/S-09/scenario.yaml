id: S-09
description: |
  computeCommand() called with no plan set must return ControllerResult::
  EmptyPath without crashing, and cmd_vel must stay at zero. This guards
  against use-after-cancel and the period after an external path topic
  goes silent.
seed: 42
tolerances:
  twist: 1.0e-9
trials:
  count: 1
  seed_strategy: fixed
plugins:
  controller:
    name: lookahead
    params:
      kp_xy: 1.0
      kp_yaw: 1.2
      max_speed_xy: 0.25
      max_speed_yaw: 0.8
      lookahead_dist: 0.30
      goal_xy_tolerance: 0.05
      goal_yaw_tolerance: 0.10
      goal_stateful: true
map:
  resolution: 0.10
  origin: [0.0, 0.0]
  occupancy: |
    ..........
    ..........
sequence:
  - {action: set_pose, pose: [0.10, 0.10, 0.0]}
  # No setPlan / set_goal here. Tick the controller a few times.
  - {action: step, count: 5, dt: 0.05}
  - {action: assert, key: outcome,        value: EMPTY_PATH}
  - {action: assert, key: last_twist.vx,  value: 0.0, tolerance: 1.0e-9}
  - {action: assert, key: last_twist.vy,  value: 0.0, tolerance: 1.0e-9}
  - {action: assert, key: last_twist.wz,  value: 0.0, tolerance: 1.0e-9}
metrics:
  nan_inf_count: 0
