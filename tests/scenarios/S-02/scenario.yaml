id: S-02
description: |
  Reach a goal, then re-issue the SAME goal. The controller's `reset()` must
  drop `xy_goal_reached_` (or otherwise re-arm) so the second pass produces a
  fresh SUCCESS instead of an immediate trivial accept that masks a stale
  state. We verify by counting goal_reach_flip_count == 2 across the run.
seed: 42
tolerances:
  pose_xy: 1.0e-4
  pose_yaw: 1.0e-3
  twist: 1.0e-3
trials:
  count: 1
  seed_strategy: fixed
plugins:
  planner:
    name: astar
    params:
      occupied_threshold: 65
      inflation_radius: 0.20
      unknown_is_obstacle: true
  controller:
    name: lookahead
    params:
      kp_xy: 1.0
      kp_yaw: 1.2
      max_speed_xy: 0.25
      max_speed_yaw: 0.8
      lookahead_dist: 0.30
      goal_xy_tolerance: 0.05
      goal_yaw_tolerance: 0.10
      goal_stateful: true
map:
  resolution: 0.10
  origin: [0.0, 0.0]
  occupancy: |
    ..........
    ..........
    ..........
    ..........
    ..........
sequence:
  - {action: set_pose, pose: [0.10, 0.10, 0.0]}
  - {action: set_goal, pose: [0.50, 0.50, 0.0]}
  - {action: drive_until, condition: goal_reached, max_steps: 300, dt: 0.05}
  - {action: assert, key: outcome, value: SUCCESS}
  # Move slightly so the second goal is a real (small) request, not a no-op.
  - {action: step, count: 5, dt: 0.05}
  - {action: set_goal, pose: [0.50, 0.50, 0.0]}
  - {action: drive_until, condition: goal_reached, max_steps: 100, dt: 0.05}
  - {action: assert, key: outcome, value: SUCCESS}
  - {action: assert, key: metrics.goal_reach_flip_count, value: 2}
  - {action: assert, key: collision_count, value: 0}
metrics:
  goal_reach_flip_count: 2
  collision_count: 0
  nan_inf_count: 0
