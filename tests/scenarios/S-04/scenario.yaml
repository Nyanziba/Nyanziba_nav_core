id: S-04
description: |
  Issue a cancel mid-flight, then issue a new goal on the SAME plugin
  instance. Internal cancel atomic flags must reset; otherwise the second
  makePlan() / computeCommand() will short-circuit. We assert that:
    - the first attempt ends with outcome == CANCELLED
    - the second attempt actually runs (planner returns a non-empty path)
    - the second attempt ends with outcome == SUCCESS
seed: 42
tolerances:
  pose_xy: 1.0e-4
  pose_yaw: 1.0e-3
trials:
  count: 1
  seed_strategy: fixed
plugins:
  planner:
    name: astar
    params:
      occupied_threshold: 65
      inflation_radius: 0.20
      unknown_is_obstacle: true
  controller:
    name: lookahead
    params:
      kp_xy: 1.0
      kp_yaw: 1.2
      max_speed_xy: 0.25
      max_speed_yaw: 0.8
      lookahead_dist: 0.30
      goal_xy_tolerance: 0.05
      goal_yaw_tolerance: 0.10
      goal_stateful: true
map:
  resolution: 0.10
  origin: [0.0, 0.0]
  occupancy: |
    ..........
    ..........
    ..........
    ..........
    ..........
sequence:
  - {action: set_pose, pose: [0.10, 0.10, 0.0]}
  - {action: set_goal, pose: [0.90, 0.90, 0.0]}
  - {action: drive_until, condition: step_count >= 20, max_steps: 20, dt: 0.05}
  - {action: cancel}
  - {action: assert, key: outcome, value: CANCELLED}
  - {action: step,   count: 5, dt: 0.05}
  - {action: assert, key: last_twist.vx, value: 0.0, tolerance: 1.0e-3}
  # Second goal on the same plugin instance must succeed.
  - {action: set_goal, pose: [0.30, 0.30, 0.0]}
  - {action: drive_until, condition: goal_reached, max_steps: 200, dt: 0.05}
  - {action: assert, key: outcome, value: SUCCESS}
  - {action: assert, key: collision_count, value: 0}
metrics:
  collision_count: 0
  nan_inf_count: 0
